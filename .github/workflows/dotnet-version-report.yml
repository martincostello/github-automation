name: dotnet-version-report

on:
  schedule:
    - cron: '30 07 * * MON'
  workflow_dispatch:

permissions: {}

jobs:
  generate:
    runs-on: ubuntu-slim
    timeout-minutes: 10

    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false

    environment:
      name: admin
      deployment: false

    permissions:
      contents: read
      id-token: write

    steps:

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          filter: 'tree:0'
          persist-credentials: false
          show-progress: false

      - name: Get GitHub token
        id: get-github-token
        uses: ./actions/get-github-token
        with:
          profile-name: read

      - name: Generate report
        uses: ./actions/dotnet-version-report
        with:
          github-token: ${{ steps.get-github-token.outputs.token }}
