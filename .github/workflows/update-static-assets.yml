name: update-static-assets

on:
  schedule:
    - cron:  '0 5 * * *'
  workflow_dispatch:
    inputs:
      repository:
        description: 'An optional single repository to update.'
        required: false
        type: string
        default: ''

permissions: {}

jobs:

  get-repos:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false

    environment:
      name: maintenance
      deployment: false

    outputs:
      repos: ${{ steps.get-repos.outputs.repos }}

    permissions:
      id-token: write

    steps:

      - name: Get GitHub token
        id: get-github-token
        uses: martincostello/github-automation/actions/get-github-token@18237c275f9a773966e3e52dcabe5e7e559a9786 # get-github-token/v4.3.1
        with:
          profile-name: maintenance

      - name: Get repositories
        id: get-repos
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.get-github-token.outputs.token }}
          REPOSITORY: ${{ github.event.inputs.repository || '' }}
        run: |
          $repo = ${env:REPOSITORY}
          if (-Not [string]::IsNullOrEmpty($repo)) {
            if (-Not $repo.Contains('/')) {
              $repo = "${env:GITHUB_REPOSITORY_OWNER}/${repo}"
            }
            $repos = @($repo)
          } else {
            $contents = gh api "repos/${env:GITHUB_REPOSITORY}/contents/.github/workflow-config.json?ref=${env:GITHUB_SHA}" | ConvertFrom-Json
            $repos = ([System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($contents.content)) | ConvertFrom-Json).'update-static-assets'
          }

          $filteredRepos = @()
          foreach ($repo in $repos) {
            if ($repo.StartsWith("${env:GITHUB_REPOSITORY_OWNER}/")) {
              $filteredRepos += $repo
            }
          }
          $reposJson = ConvertTo-Json $filteredRepos -Compress
          "repos=${reposJson}" >> ${env:GITHUB_OUTPUT}

  update-static-assets:
    name: 'update-${{ matrix.repo }}'
    needs: get-repos
    runs-on: ubuntu-slim
    timeout-minutes: 10
    if: needs.get-repos.outputs.repos != '[]'

    concurrency:
      group: 'update-assets-${{ matrix.repo }}'
      cancel-in-progress: false

    environment:
      name: maintenance
      deployment: false

    permissions:
      id-token: write

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        repo: ${{ fromJSON(needs.get-repos.outputs.repos) }}

    steps:

    - name: Get GitHub token
      id: get-github-token
      uses: martincostello/github-automation/actions/get-github-token@18237c275f9a773966e3e52dcabe5e7e559a9786 # get-github-token/v4.3.1
      with:
        profile-name: maintenance

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        filter: 'tree:0'
        persist-credentials: false
        repository: ${{ matrix.repo }}
        show-progress: false
        submodules: recursive
        token: ${{ steps.get-github-token.outputs.token }}

    - name: Update static assets
      uses: martincostello/update-static-assets@e19de6f8f89855fe1ac4b0baa43f0239a674f5cc # v4.0.1
      with:
        file-extensions: 'cshtml,erb,html,razor'
        labels: dependencies
        repo: ${{ matrix.repo }}
        repo-token: ${{ steps.get-github-token.outputs.token }}
        user-email: ${{ vars.GIT_COMMIT_USER_EMAIL }}
        user-name: ${{ vars.GIT_COMMIT_USER_NAME }}
