name: trigger-npm-audit-fix

on:
  workflow_dispatch:

permissions: {}

jobs:
  trigger-npm-audit-fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    environment:
      name: admin
      deployment: false

    permissions:
      id-token: write

    steps:

      - name: Get GitHub token
        id: get-github-token
        uses: martincostello/github-automation/actions/get-github-token@18237c275f9a773966e3e52dcabe5e7e559a9786 # get-github-token/v4.3.1
        with:
          profile-name: admin

      - name: Dispatch npm-audit-fix workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.get-github-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const allRepos = await github.paginate(
              github.rest.repos.listForUser, {
                username: owner,
                per_page: 100
              },
            );

            const repositories = allRepos
              .filter(r => !r.archived)
              .filter(r => !r.fork);

            const actor = (await github.rest.users.getAuthenticated()).data.login;

            for (const repository of repositories) {
              const repo = repository.name;
              const workflow_id = 'npm-audit-fix.yml';

              try {
                try {
                  await github.rest.repos.getContent({
                    owner,
                    repo,
                    path: `.github/workflows/${workflow_id}`,
                  });
                } catch {
                  continue;
                }

                try {
                  await github.rest.repos.checkCollaborator({
                    owner,
                    repo,
                    username: actor,
                  });
                } catch {
                  continue;
                }

                await github.rest.actions.createWorkflowDispatch({
                  owner,
                  repo,
                  workflow_id,
                  ref: repository.default_branch,
                });

                core.info(`Dispatched workflow in ${repo}.`);
              } catch (err) {
                core.warning(`Failed to dispatch workflow in ${repo}: ${err}`);
              }
            }
