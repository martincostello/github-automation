name: dotnet-upgrade-report

on:
  schedule:
    - cron: '30 07 * * *'
    - cron: '00 13 * * *'
  workflow_call:
    inputs:
      branch:
        description: 'The branch to run the report for.'
        required: true
        type: string
      gist-id:
        description: 'The optional ID of the Gist to write the report to.'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      branch:
        description: 'The branch to run the report for.'
        required: false
        type: choice
        options:
          - 'dotnet-vnext'
          - 'dotnet-nightly'
        default: 'dotnet-vnext'
      gist-id:
        description: 'The optional ID of the Gist to write the report to.'
        required: false
        type: string
        default: ''

permissions: {}

jobs:
  generate:
    runs-on: ubuntu-slim
    timeout-minutes: 15

    concurrency:
      group: '${{ github.workflow }}-${{ inputs.branch }}'
      cancel-in-progress: false

    environment:
      name: admin
      deployment: false

    permissions:
      contents: read
      id-token: write

    steps:

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          filter: 'tree:0'
          persist-credentials: false
          show-progress: false

      - name: Get GitHub token
        id: get-github-token
        uses: ./actions/get-github-token
        with:
          profile-name: admin

      - name: Generate report
        uses: ./actions/dotnet-upgrade-report
        with:
          branch: ${{ inputs.branch }}
          channel: ${{ vars.DOTNET_NIGHTLY_CHANNEL }}
          gist-id: ${{ inputs.gist-id || ((inputs.branch == 'dotnet-vnext' || github.event_name == 'schedule') && vars.UPGRADE_REPORT_GIST_ID) || '' }}
          github-token: ${{ steps.get-github-token.outputs.token }}
