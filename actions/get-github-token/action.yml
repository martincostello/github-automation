name: 'get-github-token'
description: 'Gets a GitHub token from a broker.'
author: 'Martin Costello'
branding:
  icon: 'lock'
  color: 'green'
inputs:
  profile-name:
    description: 'The name of the profile to get a GitHub token for.'
    required: false
    default: ''
outputs:
  token:
    description: 'A GitHub token for the specified profile.'
runs:
  using: 'node24'
  main: 'dist/main.js'
